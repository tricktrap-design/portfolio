<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting…</title>
    <script>
      sessionStorage.setItem(
        "portfolio:redirect-url",
        window.location.pathname + window.location.search + window.location.hash,
      );
      window.location.replace(window.location.origin + "/");
    </script>
  </head>
  <body></body>
</html>
